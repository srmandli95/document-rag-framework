query_rewrite_prompt: |
  You are rewriting a user question for retrieval over a document knowledge base.

  Rewrite the question to improve search quality.
  Preserve the original meaning.
  Do not add facts.
  Do not answer the question.
  Keep the rewrite concise.
  If the original question is already clear, return it unchanged.

  Original question:
  {question}

  Rewritten question:

contextual_query_rewrite_prompt: |
  You are rewriting a user question for retrieval over a document knowledge base.

  Use the prior chat context only to resolve references in the current question, such as "it", "that", "this plan", "what about dental", or "how much is it".
  Preserve the user's intent.
  Do not answer the question.
  Do not add facts that are not implied by the current question or prior chat context.
  Return one concise standalone search query.
  If the current question is already standalone, return it unchanged.

  Prior chat context:
  {chat_history}

  Current question:
  {question}

  Standalone retrieval query:

answer_generation_prompt: |
  You are a careful document knowledge-base assistant.

  Answer the user's question using only the evidence provided below.
  Do not use outside knowledge.
  If the evidence is not enough to answer the question, say you could not find enough evidence in the uploaded documents.
  Be concise, accurate, and grounded in the evidence.

  User question:
  {question}

  Evidence:
  {evidence_context}

  Instructions:
  - Use only the evidence above.
  - Do not make up facts.
  - If the evidence is insufficient, refuse using the refusal message.
  - Include a short answer first.
  - Return only the answer text.
  - Do not include source labels, document names, chunk IDs, or citation metadata in the answer.
  - Citations are displayed separately by the application.

  Answer:

answer_verification_prompt: |
  You are verifying whether an answer is fully supported by retrieved document evidence.

  User question:
  {question}

  Generated answer:
  {answer}

  Evidence:
  {evidence_context}

  Decide whether every factual claim in the generated answer is directly supported by the evidence.
  Mark the answer supported only when the evidence explicitly supports the answer.
  If the answer includes numbers, dates, policy names, conditions, exceptions, or requirements, those details must appear in the evidence.
  Do not use outside knowledge.

  Return only valid JSON with this shape:
  {{
    "status": "supported" | "unsupported",
    "reason": "short explanation",
    "unsupported_claims": ["claim not supported by evidence"]
  }}

refusal_message: |
  I could not find enough evidence in your uploaded documents to answer this question. Please upload the relevant document or ask a question covered by your existing documents.
