services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: document-rag-postgres
    environment:
      POSTGRES_USER: personal_policy_rag_assistant
      POSTGRES_PASSWORD: personal_policy_rag_assistant
      POSTGRES_DB: personal_policy_rag_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create_pgvector_extension.sql:/docker-entrypoint-initdb.d/create_pgvector_extension.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personal_policy_rag_assistant -d personal_policy_rag_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: document-rag-backend
    env_file:
      - .env
    environment:
      APP_NAME: Document RAG
      DATABASE_URL: postgresql+psycopg2://personal_policy_rag_assistant:personal_policy_rag_assistant@postgres:5432/personal_policy_rag_assistant
      DEV_AUTH_DISABLED: ${DEV_AUTH_DISABLED:-true}
      DEV_AUTH_USER_ID: ${DEV_AUTH_USER_ID:-local-user-123}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: document-rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
